<script type="module">
        // Importações ATUALIZADAS com o Banco de Dados (Firestore)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Cole A SUA CHAVE NOVA aqui dentro (a que você gerou no passo anterior)
        const firebaseConfig = {
            apiKey: "AIzaSyCXTYo9OYyF8QyeETlvoTfB78VLuyohULU", 
            authDomain: "calculadora-de-horas-rieps.firebaseapp.com",
            projectId: "calculadora-de-horas-rieps",
            storageBucket: "calculadora-de-horas-rieps.firebasestorage.app",
            messagingSenderId: "607480910329",
            appId: "1:607480910329:web:ca6044eba8ed8710cfad28",
            measurementId: "G-VQD21X5BP3"
        };

        // Inicia o Firebase, Autenticação e Banco de Dados
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // SISTEMA DE LOGIN E TELAS
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('tela-calculadora').style.display = 'block';
                setarHoraAtual();
                carregarMemoria();
            } else {
                document.getElementById('tela-login').style.display = 'block';
                document.getElementById('tela-calculadora').style.display = 'none';
            }
        });

        window.fazerLogin = function() {
            const email = document.getElementById('emailLogin').value;
            const senha = document.getElementById('senhaLogin').value;
            const msgErro = document.getElementById('msg-erro');
            msgErro.style.display = 'none';

            if(!email || !senha) {
                msgErro.innerText = "Preencha e-mail e senha!";
                msgErro.style.display = 'block';
                return;
            }

            signInWithEmailAndPassword(auth, email, senha)
                .catch((error) => {
                    msgErro.innerText = "Falha no acesso. Verifique seu e-mail e senha.";
                    msgErro.style.display = 'block';
                    console.error(error.message);
                });
        }

        window.fazerLogout = function() {
            signOut(auth);
        }

        document.getElementById('senhaLogin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fazerLogin();
        });

        // ==========================================
        // FUNÇÃO DE SALVAR NO BANCO DE DADOS
        // ==========================================
        async function enviarParaNuvem(textoCompleto, totalMinutos) {
            const usuario = auth.currentUser;
            if (!usuario) return;

            try {
                // Cria uma "pasta" chamada pontos_estudio e joga o documento lá dentro
                await addDoc(collection(db, "pontos_estudio"), {
                    uid_funcionario: usuario.uid,
                    email_funcionario: usuario.email,
                    data_referencia: document.getElementById('dataAtual').value,
                    minutos_trabalhados: totalMinutos,
                    horas_formatadas: formatarMinutosParaHoras(totalMinutos),
                    log_de_ponto: textoCompleto,
                    data_envio: serverTimestamp()
                });
                alert("Dia finalizado! Ponto enviado para o sistema do estúdio com sucesso.");
            } catch (erro) {
                console.error("Erro ao enviar pro banco:", erro);
                alert("Erro ao enviar o ponto para a nuvem. Tire um print ou salve o TXT por segurança!");
            }
        }

        // ==========================================
        // LÓGICA DA CALCULADORA (COM MÁQUINA DO TEMPO)
        // ==========================================
        let estadoAtual = 'fora'; 
        let minutosAcumulados = 0;
        let ultimaMarcacaoTempo = null; 
        let historicoDeAcoes = []; 

        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.key === 'z') {
                if (document.activeElement !== document.getElementById('registro')) {
                    event.preventDefault(); 
                    window.desfazer();
                }
            }
        });

        function tirarFotoDoEstado() {
            historicoDeAcoes.push({
                estadoAtual: estadoAtual,
                minutosAcumulados: minutosAcumulados,
                ultimaMarcacaoTempo: ultimaMarcacaoTempo,
                texto: document.getElementById('registro').value
            });
            if(historicoDeAcoes.length > 15) historicoDeAcoes.shift(); 
        }

        window.desfazer = function() {
            if (historicoDeAcoes.length === 0) {
                alert("Nada para desfazer!");
                return;
            }
            const estadoAnterior = historicoDeAcoes.pop();
            estadoAtual = estadoAnterior.estadoAtual;
            minutosAcumulados = estadoAnterior.minutosAcumulados;
            ultimaMarcacaoTempo = estadoAnterior.ultimaMarcacaoTempo;
            document.getElementById('registro').value = estadoAnterior.texto;
            atualizarBotoes();
            salvarMemoria();
        }

        function salvarMemoria() {
            localStorage.setItem('ponto_estado', estadoAtual);
            localStorage.setItem('ponto_minutos', minutosAcumulados.toString());
            localStorage.setItem('ponto_ultimaHora', ultimaMarcacaoTempo || '');
            localStorage.setItem('ponto_texto', document.getElementById('registro').value);
            localStorage.setItem('ponto_historico', JSON.stringify(historicoDeAcoes));
        }

        function carregarMemoria() {
            if (localStorage.getItem('ponto_estado')) {
                estadoAtual = localStorage.getItem('ponto_estado');
                minutosAcumulados = parseInt(localStorage.getItem('ponto_minutos')) || 0;
                let horaSalva = localStorage.getItem('ponto_ultimaHora');
                ultimaMarcacaoTempo = horaSalva === '' ? null : horaSalva;
                document.getElementById('registro').value = localStorage.getItem('ponto_texto') || '';
                let historicoSalvo = localStorage.getItem('ponto_historico');
                if (historicoSalvo) historicoDeAcoes = JSON.parse(historicoSalvo);
                atualizarBotoes();
                const textarea = document.getElementById('registro');
                textarea.scrollTop = textarea.scrollHeight;
            }
        }

        window.setarHoraAtual = function() {
            const agora = new Date();
            const horas = agora.getHours().toString().padStart(2, '0');
            const minutos = agora.getMinutes().toString().padStart(2, '0');
            document.getElementById('horaAcao').value = `${horas}:${minutos}`;

            const ano = agora.getFullYear();
            const mes = String(agora.getMonth() + 1).padStart(2, '0');
            const dia = String(agora.getDate()).padStart(2, '0');
            document.getElementById('dataAtual').value = `${ano}-${mes}-${dia}`;
        }

        function converterParaMinutos(horaStr) {
            if (!horaStr) return 0;
            let [h, m] = horaStr.split(':').map(Number);
            return (h * 60) + m;
        }

        function calcularDiferencaEmMinutos(horaInicio, horaFim) {
            if (!horaInicio || !horaFim) return 0;
            let inicio = converterParaMinutos(horaInicio);
            let fim = converterParaMinutos(horaFim);
            if (fim < inicio) fim += (24 * 60);
            return fim - inicio;
        }

        function formatarMinutosParaHoras(totalMinutos) {
            let h = Math.floor(totalMinutos / 60);
            let m = totalMinutos % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function atualizarBotoes() {
            document.getElementById('btnEntrei').disabled = estadoAtual !== 'fora';
            document.getElementById('btnPausa').disabled = estadoAtual !== 'trabalhando';
            document.getElementById('btnVoltei').disabled = estadoAtual !== 'pausado';
            document.getElementById('btnSaida').disabled = estadoAtual === 'fora' || estadoAtual === 'pausado';
        }

        window.registrar = function(acao) {
            const horaMarcada = document.getElementById('horaAcao').value;
            const textarea = document.getElementById('registro');
            if (!horaMarcada) { alert("Por favor, defina um horário válido."); return; }

            tirarFotoDoEstado();

            if (acao === 'Entrei') {
                const dataInput = document.getElementById('dataAtual').value;
                let dataObj = new Date(dataInput + 'T12:00:00'); 
                const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
                const nomeDia = diasSemana[dataObj.getDay()];
                const dataStr = dataObj.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                if (textarea.value !== "") textarea.value += `\n`; 
                textarea.value += `${nomeDia} (${dataStr}):\n`;
                textarea.value += `Entrei: ${horaMarcada}\n`;
                ultimaMarcacaoTempo = horaMarcada;
                minutosAcumulados = 0;
                estadoAtual = 'trabalhando';
            } 
            else if (acao === 'Pausa') {
                let motivo = prompt("Motivo da pausa? (Deixe em branco se não quiser especificar)", "Almoço");
                if (motivo === null) { historicoDeAcoes.pop(); return; }
                let textoPausa = (motivo && motivo.trim() !== "") ? `Pausa (${motivo}):` : `Pausa:`;
                textarea.value += `${textoPausa} ${horaMarcada}\n`;
                minutosAcumulados += calcularDiferencaEmMinutos(ultimaMarcacaoTempo, horaMarcada);
                estadoAtual = 'pausado';
            } 
            else if (acao === 'Voltei') {
                textarea.value += `Voltei: ${horaMarcada}\n`;
                ultimaMarcacaoTempo = horaMarcada;
                estadoAtual = 'trabalhando';
            } 
            else if (acao === 'Saí') {
                textarea.value += `Saí: ${horaMarcada}\n`;
                if (estadoAtual === 'trabalhando') {
                    minutosAcumulados += calcularDiferencaEmMinutos(ultimaMarcacaoTempo, horaMarcada);
                }
                textarea.value += `Tempo: ${formatarMinutosParaHoras(minutosAcumulados)}h\n\n`;
                
                // --- DISPARO PARA A NUVEM ACONTECE AQUI ---
                enviarParaNuvem(textarea.value, minutosAcumulados);

                estadoAtual = 'fora';
            }

            atualizarBotoes();
            textarea.scrollTop = textarea.scrollHeight;
            window.setarHoraAtual(); 
            salvarMemoria(); 
        }

        window.copiarTexto = function() {
            const textarea = document.getElementById('registro');
            textarea.select();
            document.execCommand('copy');
        }

        window.baixarTXT = function() {
            const texto = document.getElementById('registro').value;
            if(!texto) return;
            const blob = new Blob([texto], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "registro_ponto.txt";
            link.click();
        }

        window.limparTexto = function() {
            if(confirm("Tem certeza que deseja apagar todo o registro?")) {
                tirarFotoDoEstado(); 
                document.getElementById('registro').value = '';
                estadoAtual = 'fora';
                minutosAcumulados = 0;
                ultimaMarcacaoTempo = null;
                atualizarBotoes();
                salvarMemoria(); 
            }
        }
    </script>
