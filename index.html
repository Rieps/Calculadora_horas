<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Ponto - Estúdio</title>
    
    <link rel="icon" type="image/png" href="rieps.png">
    
    <style>
        body { font-family: sans-serif; max-width: 360px; margin: 40px auto; padding: 20px; background: #202124; color: #e8eaed; border-radius: 8px; }
        h2 { margin-top: 0; border-bottom: 1px solid #5f6368; padding-bottom: 10px; }
        
        .input-login { width: 100%; margin-bottom: 15px; background: #171717; color: white; border: 1px solid #5f6368; padding: 12px; border-radius: 4px; box-sizing: border-box; font-size: 15px;}
        .btn-login { width: 100%; background: #4285f4; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s;}
        .btn-login:hover { background: #5c97f5; }

        .relogio-container { background: #303134; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #5f6368;}
        .campo-hora { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;}
        .campo-hora label { font-weight: bold; font-size: 14px;}
        input[type="time"], input[type="date"] { background: #171717; color: white; border: 1px solid #5f6368; padding: 8px; border-radius: 4px; font-size: 16px; width: 130px; font-family: monospace;}
        input[type="time"]::-webkit-calendar-picker-indicator, input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        .btn-agora { background: #4285f4; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;}
        .btn-agora:hover { background: #5c97f5; }

        .botoes-acao { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .botoes-acao button { padding: 12px; color: #202124; border: none; cursor: pointer; font-size: 15px; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-entrada { background: #81c995; } .btn-entrada:hover { background: #5bb974; }
        .btn-pausa { background: #fde293; } .btn-pausa:hover { background: #f6c844; }
        .btn-voltei { background: #8ab4f8; } .btn-voltei:hover { background: #5c97f5; }
        .btn-saida { background: #f28b82; } .btn-saida:hover { background: #e06c61; }
        
        .btn-enviar { width: 100%; background: #9c27b0; color: white; border: none; padding: 14px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 15px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;}
        .btn-enviar:hover { background: #ba68c8; }
        .btn-enviar:disabled { background: #5f6368; opacity: 0.5; cursor: not-allowed; color: #aaa;}

        button:disabled { opacity: 0.4; cursor: not-allowed; }

        textarea { width: 100%; height: 260px; background: #171717; color: #e8eaed; border: 1px solid #5f6368; padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 15px; border-radius: 5px; resize: vertical;}
        
        .controls { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;}
        .controls button { flex: 1; min-width: 75px; padding: 10px; font-size: 13px; background: #5f6368; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .controls button:hover { background: #757a80; }
        .btn-desfazer { background: #f6c844 !important; color: #202124 !important; }
        .btn-desfazer:hover { background: #e5b633 !important; }
        .btn-limpar { background: #d93025 !important; }
        .btn-limpar:hover { background: #ea4335 !important; }
    </style>
</head>
<body>

    <div id="tela-login" style="display: none; padding: 20px; background: #303134; border-radius: 8px; border: 1px solid #5f6368; text-align: center; margin-top: 50px;">
        <h2 style="margin-top: 0; border: none;">Acesso ao Sistema</h2>
        <input type="email" id="emailLogin" class="input-login" placeholder="E-mail">
        <input type="password" id="senhaLogin" class="input-login" placeholder="Senha">
        <button id="btn-entrar" class="btn-login" onclick="fazerLogin()">Entrar</button>
        <p id="msg-erro" style="color: #f28b82; font-size: 14px; display: none; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div id="tela-calculadora" style="display: none;">
        <h2>Controle de Ponto
            <div style="float: right;">
                <span id="nome-usuario" style="font-size: 14px; color: #8ab4f8; font-weight: normal; margin-right: 15px;"></span>
                <button onclick="fazerLogout()" style="background: transparent; color: #f28b82; border: none; cursor: pointer; font-size: 14px; text-decoration: underline;">Sair</button>
            </div>
        </h2>
        
        <div class="relogio-container">
            <div class="campo-hora" style="margin-bottom: 15px;">
                <label>Data:</label>
                <input type="date" id="dataAtual">
            </div>
            <div class="campo-hora">
                <label>Horário do Registro:</label>
                <input type="time" id="horaAcao">
            </div>
            <button class="btn-agora" onclick="setarHoraAtual()" style="width: 100%;">Atualizar para Agora</button>
        </div>

        <div class="botoes-acao">
            <button id="btnEntrei" class="btn-entrada" onclick="registrar('Entrei')">Entrei</button>
            <button id="btnPausa" class="btn-pausa" onclick="registrar('Pausa')" disabled>Pausa</button>
            <button id="btnVoltei" class="btn-voltei" onclick="registrar('Voltei')" disabled>Voltei</button>
            <button id="btnSaida" class="btn-saida" onclick="registrar('Saí')" disabled>Saí</button>
        </div>

        <button id="btnEnviar" class="btn-enviar" onclick="acionarEnvio()" disabled>📤 Enviar para a Planilha</button>

        <textarea id="registro" placeholder="Seu registro aparecerá aqui..."></textarea>
        
        <div class="controls">
            <button onclick="copiarTexto()">Copiar</button>
            <button onclick="baixarTXT()">Salvar</button>
            <button class="btn-desfazer" onclick="desfazer()" title="Atalho: Ctrl+Z">Desfazer</button>
            <button class="btn-limpar" onclick="limparTexto()">Limpar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Para o proximo maluco que ver esse codigo - Aqui troca o API KEY (só se precisar)
        const firebaseConfig = {
            apiKey: "AIzaSyCXTYo9OYyF8QyeETlvoTfB78VLuyohULU", 
            authDomain: "calculadora-de-horas-rieps.firebaseapp.com",
            projectId: "calculadora-de-horas-rieps",
            storageBucket: "calculadora-de-horas-rieps.firebasestorage.app",
            messagingSenderId: "607480910329",
            appId: "1:607480910329:web:ca6044eba8ed8710cfad28",
            measurementId: "G-VQD21X5BP3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (!user.displayName) {
                    let novoNome = "";
                    while (!novoNome || novoNome.trim() === "") {
                        novoNome = prompt(" PRIMEIRO ACESSO \n\nDigite o seu PRIMEIRO NOME para o sistema gerar a sua planilha.");
                        if (novoNome === null) { signOut(auth); return; }
                    }
                    let nomeLimpo = novoNome.trim().split(' ')[0];
                    nomeLimpo = nomeLimpo.charAt(0).toUpperCase() + nomeLimpo.slice(1).toLowerCase();
                    updateProfile(user, { displayName: nomeLimpo })
                    .then(() => { iniciarInterface(nomeLimpo); })
                    .catch((erro) => { alert("Erro. Tente novamente."); signOut(auth); });
                } else {
                    iniciarInterface(user.displayName);
                }
            } else {
                document.getElementById('tela-login').style.display = 'block';
                document.getElementById('tela-calculadora').style.display = 'none';
            }
        });

        function iniciarInterface(nome) {
            document.getElementById('nome-usuario').innerText = `Olá, ${nome}`;
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-calculadora').style.display = 'block';
            window.setarHoraAtual();
            window.carregarMemoria();
        }

        window.fazerLogin = function() {
            const email = document.getElementById('emailLogin').value;
            const senha = document.getElementById('senhaLogin').value;
            const msgErro = document.getElementById('msg-erro');
            msgErro.style.display = 'none';
            signInWithEmailAndPassword(auth, email, senha).catch(() => {
                msgErro.innerText = "Erro no login. Verifique os dados.";
                msgErro.style.display = 'block';
            });
        }

        document.getElementById('senhaLogin').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') window.fazerLogin();
        });

        window.fazerLogout = function() { signOut(auth); }

        async function enviarParaNuvem(textoCompleto, totalMinutos) {
            const usuario = auth.currentUser;
            if (!usuario) return;

            const nomeIntegrante = usuario.displayName;

            const dadosPonto = {
                nome: nomeIntegrante,
                data: document.getElementById('dataAtual').value,
                entrada: hEntrada,
                pausas: pausas, 
                saida: hSaida,
                totalHoras: formatarMinutosParaHoras(totalMinutos),
                log: textoCompleto
            };

            try {
                await addDoc(collection(db, "pontos_estudio"), { ...dadosPonto, timestamp: serverTimestamp() });
               
                // Para o proximo maluco que ver esse codigo - Aqui troca o link do script para a planilha
                const urlPlanilha = "https://script.google.com/macros/s/AKfycbyuz4KIgq3qBQZ5LaYHffT7jMO1nBXfJFhmjLMb8P9CfiQ7aIZBrt8kkSgS-X-sgRUfvg/exec"; 
                fetch(urlPlanilha, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dadosPonto) });

                alert(`Ponto registrado com sucesso na aba "${nomeIntegrante}" da planilha Jangada!`);
                
                document.getElementById('registro').value = ''; 
                minutosAcumulados = 0; 
                hEntrada = ""; hSaida = ""; pausas = []; inicioPausaAtual = ""; motivoPausaAtual = "";
                estadoAtual = 'fora';
                atualizarBotoes();
                window.salvarMemoria();

            } catch (e) { console.error("Erro ao enviar dados: ", e); }
        }

        window.acionarEnvio = function() {
            const textarea = document.getElementById('registro');
            enviarParaNuvem(textarea.value, minutosAcumulados);
        }

        // Variáveis de Controle
        let hEntrada = "";
        let hSaida = "";
        let pausas = [];
        let inicioPausaAtual = "";
        let motivoPausaAtual = "";

        let estadoAtual = 'fora'; 
        let minutosAcumulados = 0;
        let ultimaMarcacaoTempo = null; 
        let historicoDeAcoes = []; 

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z' && document.activeElement !== document.getElementById('registro')) {
                e.preventDefault(); window.desfazer();
            }
        });

        function tirarFotoDoEstado() {
            historicoDeAcoes.push({
                estadoAtual, minutosAcumulados, ultimaMarcacaoTempo,
                texto: document.getElementById('registro').value,
                hEntrada, hSaida,
                pausas: JSON.parse(JSON.stringify(pausas)),
                inicioPausaAtual, motivoPausaAtual
            });
            if(historicoDeAcoes.length > 15) historicoDeAcoes.shift(); 
        }

        window.desfazer = function() {
            if (historicoDeAcoes.length === 0) return;
            const ant = historicoDeAcoes.pop();
            estadoAtual = ant.estadoAtual;
            minutosAcumulados = ant.minutosAcumulados;
            ultimaMarcacaoTempo = ant.ultimaMarcacaoTempo;
            document.getElementById('registro').value = ant.texto;
            hEntrada = ant.hEntrada;
            hSaida = ant.hSaida;
            pausas = ant.pausas;
            inicioPausaAtual = ant.inicioPausaAtual;
            motivoPausaAtual = ant.motivoPausaAtual;
            atualizarBotoes();
            salvarMemoria();
        }

        window.registrar = function(acao) {
            const hora = document.getElementById('horaAcao').value;
            const textarea = document.getElementById('registro');
            tirarFotoDoEstado();

            if (acao === 'Entrei') {
                hEntrada = hora;
                hSaida = ""; pausas = []; inicioPausaAtual = ""; motivoPausaAtual = ""; 
                
                const dataInput = document.getElementById('dataAtual').value;
                let dataObj = new Date(dataInput + 'T12:00:00');
                const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
                const dataStr = dataObj.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
                if (textarea.value !== "") textarea.value += `\n`;
                textarea.value += `${dias[dataObj.getDay()]} (${dataStr}):\nEntrei: ${hora}\n`;
                
                ultimaMarcacaoTempo = hora; minutosAcumulados = 0; estadoAtual = 'trabalhando';
            } 
            else if (acao === 'Pausa') {
                let m = prompt("Motivo da pausa?", "Almoço");
                if (m === null) { historicoDeAcoes.pop(); return; }
                inicioPausaAtual = hora; 
                motivoPausaAtual = m;
                
                textarea.value += `Pausa (${m}): ${hora}\n`;
                minutosAcumulados += calcularDiferencaEmMinutos(ultimaMarcacaoTempo, hora);
                estadoAtual = 'pausado';
            } 
            else if (acao === 'Voltei') {
                pausas.push({ inicio: inicioPausaAtual, fim: hora, motivo: motivoPausaAtual });
                textarea.value += `Voltei: ${hora}\n`;
                ultimaMarcacaoTempo = hora; estadoAtual = 'trabalhando';
            } 
            else if (acao === 'Saí') {
                hSaida = hora; 
                textarea.value += `Saí: ${hora}\n`;
                if (estadoAtual === 'trabalhando') minutosAcumulados += calcularDiferencaEmMinutos(ultimaMarcacaoTempo, hora);
                textarea.value += `Tempo: ${formatarMinutosParaHoras(minutosAcumulados)}h\n\n`;
                
                estadoAtual = 'aguardando_envio';
            }
            atualizarBotoes(); textarea.scrollTop = textarea.scrollHeight; window.setarHoraAtual(); salvarMemoria();
        }

        window.setarHoraAtual = function() {
            const a = new Date();
            document.getElementById('horaAcao').value = `${a.getHours().toString().padStart(2,'0')}:${a.getMinutes().toString().padStart(2,'0')}`;
            document.getElementById('dataAtual').value = a.toISOString().split('T')[0];
        }
        
        function converterParaMinutos(h) { let [hr, mi] = h.split(':').map(Number); return (hr * 60) + mi; }
        function calcularDiferencaEmMinutos(i, f) { let ini = converterParaMinutos(i), fim = converterParaMinutos(f); if (fim < ini) fim += 1440; return fim - ini; }
        function formatarMinutosParaHoras(t) { return `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`; }
        
        function atualizarBotoes() {
            document.getElementById('btnEntrei').disabled = estadoAtual !== 'fora';
            document.getElementById('btnPausa').disabled = estadoAtual !== 'trabalhando';
            document.getElementById('btnVoltei').disabled = estadoAtual !== 'pausado';
            document.getElementById('btnSaida').disabled = estadoAtual === 'fora' || estadoAtual === 'pausado' || estadoAtual === 'aguardando_envio';
            
            const btnEnviar = document.getElementById('btnEnviar');
            if(btnEnviar) btnEnviar.disabled = estadoAtual !== 'aguardando_envio';
        }

        window.salvarMemoria = function() {
            localStorage.setItem('p_est', estadoAtual);
            localStorage.setItem('p_min', minutosAcumulados);
            localStorage.setItem('p_uH', ultimaMarcacaoTempo || '');
            localStorage.setItem('p_txt', document.getElementById('registro').value);
            localStorage.setItem('p_pausas', JSON.stringify(pausas));
            localStorage.setItem('p_ip', inicioPausaAtual);
            localStorage.setItem('p_mp', motivoPausaAtual);
        }
        
        window.carregarMemoria = function() {
            if (localStorage.getItem('p_est')) {
                estadoAtual = localStorage.getItem('p_est');
                minutosAcumulados = parseInt(localStorage.getItem('p_min')) || 0;
                ultimaMarcacaoTempo = localStorage.getItem('p_uH') || null;
                document.getElementById('registro').value = localStorage.getItem('p_txt') || '';
                try { pausas = JSON.parse(localStorage.getItem('p_pausas')) || []; } catch(e){ pausas = []; }
                inicioPausaAtual = localStorage.getItem('p_ip') || '';
                motivoPausaAtual = localStorage.getItem('p_mp') || '';
                atualizarBotoes();
            }
        }
        
        window.copiarTexto = function() { document.getElementById('registro').select(); document.execCommand('copy'); }
        window.baixarTXT = function() {
            const blob = new Blob([document.getElementById('registro').value], {type: "text/plain"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "ponto.txt"; a.click();
        }
        window.limparTexto = function() { 
            if(confirm("Apagar tudo?")) { 
                tirarFotoDoEstado(); 
                document.getElementById('registro').value = ''; 
                estadoAtual = 'fora'; 
                minutosAcumulados = 0; 
                hEntrada = ""; hSaida = ""; pausas = []; inicioPausaAtual = ""; motivoPausaAtual = "";
                atualizarBotoes(); 
                salvarMemoria(); 
            } 
        }
    </script>
</body>
</html>
